name: file-shape-governance

on:
  pull_request:
    paths:
      - "apps/vector-editor-web/src/**"
      - "packages/engine/src/**"
      - "packages/lib/src/**"
      - "packages/editor-primitive/src/**"
      - "scripts/file-shape-guard.mjs"
      - ".github/workflows/file-shape-governance.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - "apps/vector-editor-web/src/**"
      - "packages/engine/src/**"
      - "packages/lib/src/**"
      - "packages/editor-primitive/src/**"
      - "scripts/file-shape-guard.mjs"
      - ".github/workflows/file-shape-governance.yml"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  file-shape-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.7.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: File Shape Guard (Changed Files)
        run: pnpm governance:file-shape -- --scope all --base origin/main
