name: engine-governance

on:
  pull_request:
    paths:
      - "packages/engine/**"
      - ".github/workflows/engine-governance.yml"
      - "pnpm-lock.yaml"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "packages/engine/**"
      - ".github/workflows/engine-governance.yml"
      - "pnpm-lock.yaml"
      - "package.json"

jobs:
  governance-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.7.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Engine CR Gate
        run: pnpm engine:cr:check

      - name: Engine Typecheck
        run: pnpm --filter @venus/engine exec tsc --noEmit

      - name: Engine Tests
        run: pnpm --filter @venus/engine test

      - name: Release Debug Guard
        run: pnpm --filter @venus/engine debug:guard

      - name: Baseline Report Smoke
        run: pnpm --filter @venus/engine bench:baseline -- --out=/tmp/engine-baseline-report.json

      - name: Policy Replay Smoke
        run: pnpm --filter @venus/engine policy:replay --report=/tmp/engine-baseline-report.json > /tmp/engine-policy-replay.json

      - name: Dashboard Ingestion Smoke
        run: pnpm --filter @venus/engine dashboard:update --report=/tmp/engine-baseline-report.json
