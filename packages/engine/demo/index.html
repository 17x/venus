<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@venus/engine rendering demo</title>
    <style>
      :root {
        color: #172033;
        background: #f6f8fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        gap: 16px;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      p {
        margin: 6px 0 0;
        color: #596780;
      }

      canvas {
        width: min(100%, 960px);
        height: 560px;
        border: 1px solid #d7deea;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgb(30 41 59 / 12%);
      }

      #status {
        min-width: 260px;
        border: 1px solid #d7deea;
        border-radius: 12px;
        background: #ffffff;
        padding: 10px 12px;
        color: #334155;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>@venus/engine local rendering demo</h1>
          <p>Canvas2D backend: shapes, text, clipped image, hit-test, pan, and zoom.</p>
        </div>
        <div id="status">Loading engine…</div>
      </header>
      <canvas id="engine-canvas" width="960" height="560"></canvas>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
